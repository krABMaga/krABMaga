on: [push, pull_request]

name: Continuous integration

jobs:
  deps-cache-warmup:
    name: Warm APT deps cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        uses: ./.github/workflows/install-deps

  check:
    name: Check
    needs: deps-cache-warmup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        uses: ./.github/workflows/install-deps
      - run: cargo check --release

  checkvis:
    name: Check visualization and bayesian
    needs: deps-cache-warmup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        uses: ./.github/workflows/install-deps
      - run: cargo check --release --features "visualization, bayesian"

  checkmpi:
    needs: deps-cache-warmup
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rust: stable
            mpi: openmpi

    name: check ${{ matrix.os }} MPI
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup MPI
        uses: mpi4py/setup-mpi@v1
        with:
          mpi: ${{ matrix.mpi }}
      - uses: Swatinem/rust-cache@v2
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - name: Install system dependencies
        uses: ./.github/workflows/install-deps
      - run: cargo check --release --features distributed_mpi

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    needs: deps-cache-warmup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install system dependencies
        uses: ./.github/workflows/install-deps
      - run: cargo clippy

  clippyvis:
    name: Clippy visualization
    needs: deps-cache-warmup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Install system dependencies
        uses: ./.github/workflows/install-deps
      - run: cargo clippy --features "visualization, bayesian"

  clippympi:
    needs: deps-cache-warmup
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rust: stable
            mpi: openmpi

    name: clippy ${{ matrix.os }} MPI
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup MPI
        uses: mpi4py/setup-mpi@v1
        with:
          mpi: ${{ matrix.mpi }}
      - uses: Swatinem/rust-cache@v2
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - name: Install system dependencies
        uses: ./.github/workflows/install-deps
      - run: cargo clippy --features distributed_mpi
