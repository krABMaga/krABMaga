name: 'Install System Dependencies'
description: 'Install required system dependencies with caching'

runs:
  using: 'composite'
  steps:
    - name: Prepare local APT cache directory
      shell: bash
      run: |
        mkdir -p "${GITHUB_WORKSPACE}/.apt-cache/archives/partial"

    - name: Restore APT packages cache
      uses: actions/cache/restore@v5
      id: cache-apt-restore
      with:
        path: ${{ github.workspace }}/.apt-cache/archives/*.deb
        key: ${{ runner.os }}-${{ runner.arch }}-apt-home-${{ hashFiles('.github/workflows/install-deps/action.yml') }}-v4
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-apt-home-
          ${{ runner.os }}-apt-home-

    - name: Download system dependency packages
      if: steps.cache-apt-restore.outputs.cache-hit != 'true'
      shell: bash
      run: |
        CACHE_DIR="${GITHUB_WORKSPACE}/.apt-cache/archives"
        sudo apt update
        sudo apt install -y --download-only -o Dir::Cache::archives="$CACHE_DIR" \
          pkg-config libx11-dev libasound2-dev libudev-dev libgtk-3-dev \
          libwayland-dev libxkbcommon-dev \
          libxcb-randr0-dev libxcb-xtest0-dev libxcb-xinerama0-dev libxcb-shape0-dev libxcb-xkb-dev \
          libxcb-render0-dev libxcb-xfixes0-dev libxcb1-dev \
          portaudio19-dev build-essential libpulse-dev libdbus-1-dev \
          libfontconfig libfontconfig1-dev
        sudo chown -R "$(id -u):$(id -g)" "${GITHUB_WORKSPACE}/.apt-cache"

    - name: Save APT packages cache
      if: steps.cache-apt-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: ${{ github.workspace }}/.apt-cache/archives/*.deb
        key: ${{ runner.os }}-${{ runner.arch }}-apt-home-${{ hashFiles('.github/workflows/install-deps/action.yml') }}-v4

    - name: Install cached packages
      shell: bash
      run: |
        CACHE_DIR="${GITHUB_WORKSPACE}/.apt-cache/archives"
        sudo apt update
        sudo apt install -y --no-download -o Dir::Cache::archives="$CACHE_DIR" \
          pkg-config libx11-dev libasound2-dev libudev-dev libgtk-3-dev \
          libwayland-dev libxkbcommon-dev \
          libxcb-randr0-dev libxcb-xtest0-dev libxcb-xinerama0-dev libxcb-shape0-dev libxcb-xkb-dev \
          libxcb-render0-dev libxcb-xfixes0-dev libxcb1-dev \
          portaudio19-dev build-essential libpulse-dev libdbus-1-dev \
          libfontconfig libfontconfig1-dev || \
        sudo apt install -y -o Dir::Cache::archives="$CACHE_DIR" \
          pkg-config libx11-dev libasound2-dev libudev-dev libgtk-3-dev \
          libwayland-dev libxkbcommon-dev \
          libxcb-randr0-dev libxcb-xtest0-dev libxcb-xinerama0-dev libxcb-shape0-dev libxcb-xkb-dev \
          libxcb-render0-dev libxcb-xfixes0-dev libxcb1-dev \
          portaudio19-dev build-essential libpulse-dev libdbus-1-dev \
          libfontconfig libfontconfig1-dev
